---
layout: default
---
<div class="post">

  <header class="post-header">
    <h1>{{ page.title }} </h1>
  </header>

  <article class="post-content">
  {{ content }}
  </article>

</div>


<!-- mathjax -->
{% if page.mathjax %}
<script>
MathJax = {
  tex: {
    inlineMath: [['$', '$'], ['\\(', '\\)']]
  },
  svg: {
    fontCache: 'global'
  }
};
</script>
<script type="text/javascript" id="MathJax-script" async
  src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js">
</script>
{% endif %}
